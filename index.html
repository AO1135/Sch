<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空き時間共有カレンダー</title>
<style>
  :root {
    --primary: #374151;
    --primary-dark: #1f2937;
    --bg: #f9fafb;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: #111827; color: white; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  #secret-admin-trigger { cursor: pointer; user-select: none; }
  .header-badges { display: flex; gap: 8px; align-items: center; }
  .badge { padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
  .badge.admin { background: rgba(255,255,255,0.25); }

  .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; color: var(--muted); white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--bg); }

  .section { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
  .section.active { display: block; }

  .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--border); margin-bottom: 14px; }
  .card h2 { font-size: 1rem; margin-bottom: 14px; font-weight: 600; }
  .card h3 { font-size: 0.875rem; margin-bottom: 10px; color: var(--muted); }

  .form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
  input[type="text"], input[type="password"], input[type="time"], input[type="date"], select {
    padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; color: var(--text); background: white; transition: border-color 0.2s;
  }
  input:focus, select:focus { outline: none; border-color: var(--primary); }

  .btn { padding: 8px 16px; border: 1px solid transparent; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: #111827; color: white; border-color: #111827; }
  .btn-primary:hover { background: #374151; }
  .btn-danger { background: white; color: #374151; border-color: #d1d5db; }
  .btn-danger:hover { background: #f3f4f6; }
  .btn-success { background: #111827; color: white; border-color: #111827; }
  .btn-secondary { background: white; color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-warning { background: #374151; color: white; border-color: #374151; }
  .btn-sm { padding: 5px 10px; font-size: 0.8rem; }

  .cal-wrap { overflow-x: auto; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; min-width: 280px; }
  .cal-header { text-align: center; padding: 6px 2px; font-size: 0.72rem; font-weight: 600; color: var(--muted); }
  .cal-header.sun { color: #ef4444; }
  .cal-header.sat { color: #3b82f6; }

  .cal-day {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 48px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 500;
    transition: all 0.12s; position: relative; user-select: none;
    border: 2px solid transparent; padding: 2px; gap: 1px;
  }
  .cal-day.empty { cursor: default; background: none !important; border-color: transparent !important; }
  .cal-day.sun .day-num { color: #ef4444; }
  .cal-day.sat .day-num { color: #3b82f6; }
  .cal-day.today { box-shadow: none; }

  .cal-day.day-free { background: #bbf7d0; border-color: #16a34a; }
  .cal-day.day-free .day-num { color: #14532d; }
  .cal-day.day-am { background: #bfdbfe; border-color: #2563eb; }
  .cal-day.day-am .day-num { color: #1e3a8a; }
  .cal-day.day-pm { background: #fef08a; border-color: #ca8a04; }
  .cal-day.day-pm .day-num { color: #713f12; }
  .cal-day.day-busy { background: #fecaca; border-color: #dc2626; }
  .cal-day.day-busy .day-num { color: #7f1d1d; }
  .cal-day:not(.empty):not(.day-free):not(.day-busy):not(.day-time):hover { background: #f3f4f6; }

  .cal-day.common-all  { background: #bbf7d0; border-color: #16a34a; }
  .cal-day.common-all .day-num { color: #14532d; }
  .cal-day.common-none { background: #fecaca; border-color: #dc2626; }
  .cal-day.common-none .day-num { color: #7f1d1d; }
  .cal-day.common-time { background: #fef08a; border-color: #ca8a04; }
  .cal-day.common-time .day-num { color: #713f12; }
  .cal-day.common-partial { background: #e5e7eb; border-color: #9ca3af; }

  .day-num { font-weight: 600; font-size: 0.85rem; line-height: 1; }
  .day-time-label {
    font-size: 0.6rem; font-weight: 600; line-height: 1.1; color: #713f12;
    text-align: center; white-space: nowrap; overflow: hidden; max-width: 100%;
    padding: 1px 2px; background: rgba(255,255,255,0.6); border-radius: 3px;
  }

  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav h3 { font-size: 0.95rem; font-weight: 600; }
  .cal-nav-btn { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.85rem; }
  .cal-nav-btn:hover { background: var(--bg); }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
  .legend-dot { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }

  .user-list { display: flex; flex-direction: column; gap: 6px; }
  .user-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  .user-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #111827; }
  .user-avatar { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: white; flex-shrink: 0; background: #374151; }
  .user-name { font-weight: 500; font-size: 0.875rem; flex: 1; }

  .group-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border-radius: 8px; border: 1.5px solid var(--border); margin-bottom: 6px; }

  .output-day { display: inline-flex; flex-direction: column; gap: 2px; padding: 8px 12px; background: #dcfce7; border: 1px solid #86efac; border-radius: 6px; font-weight: 500; font-size: 0.875rem; color: #14532d; margin: 3px; }

  .mode-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 14px; }

  .alert { padding: 9px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; font-weight: 500; }
  .alert-success { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .alert-error { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .alert-info { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

  .public-header { text-align: center; padding: 20px; background: #111827; color: white; border-radius: 8px; margin-bottom: 14px; }
  .public-header h2 { font-size: 1.3rem; margin-bottom: 4px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 10px; padding: 24px; min-width: 300px; max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.15); border: 1px solid var(--border); }
  .modal h2 { margin-bottom: 16px; font-size: 1rem; font-weight: 600; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .pw-text { font-family: monospace; background: #f3f4f6; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 0.82rem; }

  .maintenance-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: none;
    align-items: center;
    justify-content: center;
    background: #111827;
    color: white;
    font-size: clamp(2rem, 8vw, 5rem);
    font-weight: 800;
    letter-spacing: 0.08em;
  }

  .maintenance-overlay.active {
    display: flex;
  }

  @media(max-width:600px) {
    .form-row { flex-direction: column; }
    .cal-day { font-size: 0.72rem; min-height: 40px; }
    .day-time-label { font-size: 0.55rem; }
  }
</style>
</head>
<body>
<!--
  メンテナン画面
  <div id="maintenance-overlay" class="maintenance-overlay active" data-enabled="true">メンテナンス中</div>
-->

<div id="maintenance-overlay" class="maintenance-overlay active" data-enabled="true">メンテナンス中</div>

<header>
  <h1 id="secret-admin-trigger">空き時間共有カレンダー</h1>
  <div class="header-badges">
    <span class="badge" id="mode-badge">閲覧者モード</span>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('input', this)">予定入力</button>
  <button class="tab-btn" onclick="showTab('public', this)">公開カレンダー</button>
  <button class="tab-btn admin-only" onclick="showTab('admin', this)" style="display:none;">管理追加</button>
  <button class="tab-btn admin-only" onclick="showTab('manage', this)" style="display:none;">管理一覧</button>
</div>

<div id="tab-input" class="section active">
  <div class="card" id="login-card">
    <h2>ログイン</h2>
    <div class="form-row">
      <div class="form-group">
        <label>ユーザー名</label>
        <input type="text" id="login-username" placeholder="ユーザー名" autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-password" placeholder="パスワード" autocomplete="new-password" onkeydown="if(event.key==='Enter')loginUser()">
      </div>
      <button class="btn btn-primary" onclick="loginUser()">ログイン</button>
    </div>
    <div id="login-msg"></div>
  </div>

  <div id="input-area" style="display:none;">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2>予定入力: <span id="current-username" style="color:#374151;font-weight:700;"></span></h2>
        <button class="btn btn-secondary btn-sm" onclick="logoutUser()">ログアウト</button>
      </div>

      <div class="form-row" style="margin-bottom:12px;align-items:center;">
        <div class="form-group" style="max-width:240px;">
          <label>入力タイプ</label>
          <select id="input-type-select" onchange="setInputType(this.value)">
            <option value="full">一日</option>
            <option value="am">午前</option>
            <option value="pm">午後</option>
          </select>
        </div>
      </div>

      <div class="alert alert-info" id="input-type-info">
        <strong>通常入力：</strong>入力タイプを選んでカレンダーを押すと反映されます。もう一度押すと未設定に戻せます。
      </div>

      <div class="legend" style="margin-bottom:12px;">
        <div class="legend-item"><div class="legend-dot" style="background:#bbf7d0;border:2px solid #16a34a;"></div> 一日（緑）</div>
        <div class="legend-item"><div class="legend-dot" style="background:#bfdbfe;border:2px solid #2563eb;"></div> 午前（青）</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fef08a;border:2px solid #ca8a04;"></div> 午後（黄）</div>
        <div class="legend-item"><div class="legend-dot" style="background:white;border:2px solid #e5e7eb;"></div> 未設定</div>
      </div>

      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeInputMonth(-1)">◀</button>
        <h3 id="input-cal-title"></h3>
        <button class="cal-nav-btn" onclick="changeInputMonth(1)">▶</button>
      </div>
      <div class="cal-wrap">
        <div class="calendar" id="input-calendar"></div>
      </div>

      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">
        <button class="btn btn-success" onclick="saveSchedule()">保存</button>
        <button class="btn btn-secondary" onclick="clearInputSelection()">クリア</button>
      </div>
    </div>
  </div>
</div>

<div id="tab-public" class="section">
  <div class="card">
    <h2>公開カレンダー閲覧</h2>
    <p style="font-size:0.85rem;color:var(--muted);margin-bottom:12px;">所属グループを選択してください。</p>
    <div id="public-group-selector" class="user-list"></div>
  </div>

  <div id="public-calendar-area" style="display:none;">
    <div class="public-header">
      <h2 id="public-group-title"></h2>
      <p>共通の空き日時</p>
    </div>
    <div class="card">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#bbf7d0;border:2px solid #16a34a;"></div> 全員空き（緑）</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fef08a;border:2px solid #ca8a04;"></div> 共通時間帯あり（黄）</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fecaca;border:2px solid #dc2626;"></div> 空きなし（赤）</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e5e7eb;border:2px solid #9ca3af;"></div> 一部空き</div>
      </div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changePublicMonth(-1)">◀</button>
        <h3 id="public-cal-title"></h3>
        <button class="cal-nav-btn" onclick="changePublicMonth(1)">▶</button>
      </div>
      <div class="cal-wrap">
        <div class="calendar" id="public-calendar"></div>
      </div>
    </div>
    <div class="card">
      <h2>空き日時一覧</h2>
      <div id="public-output-list"></div>
    </div>
  </div>
</div>

<div id="tab-admin" class="section">
  <div class="mode-panel"><h3>管理者モード</h3><p style="font-size:0.85rem;color:var(--muted);">このタブでは追加のみ行えます。</p></div>
  <div class="card">
    <h2>ユーザー追加</h2>
    <div class="form-row">
      <div class="form-group"><label>ユーザー名</label><input type="text" id="admin-new-username" placeholder="新しいユーザー名" autocomplete="off" autocapitalize="off"></div>
      <div class="form-group"><label>パスワード</label><input type="password" id="admin-new-password" placeholder="パスワード" autocomplete="new-password"></div>
      <button class="btn btn-primary" onclick="addUser()">追加</button>
    </div>
  </div>
  <div class="card">
    <h2>グループ追加</h2>
    <div class="form-row">
      <div class="form-group"><label>グループ名</label><input type="text" id="admin-group-name" placeholder="グループ名" autocomplete="off" autocapitalize="off"></div>
      <button class="btn btn-primary" onclick="addGroup()">グループ作成</button>
    </div>
  </div>
  <div class="card">
    <h2>データ管理</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-warning" onclick="exportData()">📥 データ書き出し</button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📤 データ読み込み</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-danger" onclick="if(confirm('すべてのデータをリセットしますか？'))resetAll()">🗑 全リセット</button>
    </div>
  </div>
</div>

<div id="tab-manage" class="section">
  <div class="mode-panel"><h3>管理一覧</h3><p style="font-size:0.85rem;color:var(--muted);">ユーザーとグループを管理できます。</p></div>
  <div class="card"><h2>ユーザー一覧</h2><div id="admin-user-list" class="user-list"></div></div>
  <div class="card"><h2>グループ一覧</h2><div id="admin-group-list"></div></div>
</div>

<div class="modal-overlay" id="mode-modal">
  <div class="modal">
    <h2>🔐 モード切替</h2>
    <div class="form-group" style="margin-bottom:12px;">
      <label>管理者パスワード</label>
      <input type="password" id="admin-password-input" placeholder="パスワードを入力" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')tryAdminLogin()">
    </div>
    <div id="mode-modal-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="tryAdminLogin()">ログイン</button>
      <button class="btn btn-warning" id="logout-admin-btn" style="display:none;" onclick="logoutAdmin()">管理者ログアウト</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqHcFOvjgNf08hJneUSJUU2deoqWSJVHw",
  authDomain: "schsha-ea57a.firebaseapp.com",
  databaseURL: "https://schsha-ea57a-default-rtdb.firebaseio.com",
  projectId: "schsha-ea57a",
  storageBucket: "schsha-ea57a.firebasestorage.app",
  messagingSenderId: "1017948674310",
  appId: "1:1017948674310:web:6b52fa0f8b697198c8e687",
  measurementId: "G-Z2W0YDWYYX"
};

const firebaseApp = initializeApp(firebaseConfig);
const database = getDatabase(firebaseApp);
const DB_REF = ref(database, 'scheduleApp');
const ADMIN_HASH_REF = ref(database, 'scheduleAppMeta/adminHash');

function getDefaultData() { return { users: {}, groups: {}, schedules: {} }; }

let db = getDefaultData();
let _isSaving = false;
let isAdmin = false;
let currentUser = null;
let currentInputType = 'full';
let inputSelections = {};

const now = new Date();
let inputYear = now.getFullYear(), inputMonth = now.getMonth();
let publicYear = now.getFullYear(), publicMonth = now.getMonth();
let publicGroupIds = [];
let adminHash = null;
let titleTapCount = 0;
let titleTapTimer = null;

async function sha256Hex(text) {
  const bytes = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', bytes);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function ensureAdminHash() {
  const snap = await get(ADMIN_HASH_REF);
  if (snap.exists()) {
    adminHash = snap.val();
    return;
  }
  const defaultHash = await sha256Hex('1237');
  adminHash = defaultHash;
  await set(ADMIN_HASH_REF, defaultHash);
}

function saveData() {
  _isSaving = true;
  set(DB_REF, JSON.parse(JSON.stringify(db)))
    .then(() => { _isSaving = false; })
    .catch(e => { _isSaving = false; console.error('保存エラー', e); });
}

function normalizeDB(raw) {
  if (!raw || typeof raw !== 'object') return getDefaultData();
  const normalized = {
    users: raw.users && typeof raw.users === 'object' ? raw.users : {},
    groups: raw.groups && typeof raw.groups === 'object' ? raw.groups : {},
    schedules: raw.schedules && typeof raw.schedules === 'object' ? raw.schedules : {}
  };
  Object.keys(normalized.schedules).forEach(username => {
    const sched = normalized.schedules[username] || {};
    if (!sched.days || typeof sched.days !== 'object') sched.days = {};
    if (!sched.times || typeof sched.times !== 'object') sched.times = {};
  });
  return normalized;
}

onValue(DB_REF, (snapshot) => {
  if (_isSaving) return;
  db = normalizeDB(snapshot.val());
  refreshUI();
}, (err) => {
  console.error('Firebase read error', err);
  refreshUI();
});

function refreshUI() {
  const activeTab = document.querySelector('.section.active');
  const tabId = activeTab ? activeTab.id.replace('tab-', '') : 'input';
  if (tabId === 'input') {
    if (currentUser) renderInputCalendar();
  }
  if (tabId === 'public') renderPublicCalendar();
  if (tabId === 'admin' && isAdmin) renderAdminInputTab();
  if (tabId === 'manage' && isAdmin) renderAdminManageTab();
}

function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');

  if (name === 'input') {
    if (currentUser) {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('input-area').style.display = 'block';
      renderInputCalendar();
    } else {
      document.getElementById('login-card').style.display = 'block';
      document.getElementById('input-area').style.display = 'none';
    }
  }
  if (name === 'public') {
    renderPublicGroupOptions();
    renderPublicCalendar();
  }
  if (name === 'admin' && isAdmin) renderAdminInputTab();
  if (name === 'manage' && isAdmin) renderAdminManageTab();
}
window.showTab = showTab;

function updateMaintenanceOverlay() {
  const overlay = document.getElementById('maintenance-overlay');
  if (!overlay) return;
  if (overlay.dataset.enabled === 'true' && !isAdmin) {
    overlay.classList.add('active');
  } else {
    overlay.classList.remove('active');
  }
}

function setupSecretAdminTrigger() {
  const title = document.getElementById('secret-admin-trigger');
  if (!title) return;

  title.addEventListener('click', () => {
    titleTapCount += 1;

    if (titleTapTimer) clearTimeout(titleTapTimer);
    titleTapTimer = setTimeout(() => {
      titleTapCount = 0;
    }, 1500);

    if (titleTapCount >= 7) {
      titleTapCount = 0;
      openModeModal();
    }
  });
}

function openModeModal() {
  document.getElementById('mode-modal').classList.add('open');
  document.getElementById('admin-password-input').value = '';
  document.getElementById('mode-modal-msg').innerHTML = '';
  document.getElementById('logout-admin-btn').style.display = isAdmin ? 'block' : 'none';
  setTimeout(() => document.getElementById('admin-password-input').focus(), 100);
}
function closeModeModal() { document.getElementById('mode-modal').classList.remove('open'); }

function toHalf(s) {
  return (s || '').replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).trim();
}

async function tryAdminLogin() {
  const raw = document.getElementById('admin-password-input').value;
  const pw = toHalf(raw);
  const pwHash = await sha256Hex(pw);
  if (pwHash === adminHash) {
    isAdmin = true;
    document.getElementById('mode-badge').textContent = '管理者モード';
    document.getElementById('mode-badge').className = 'badge admin';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    closeModeModal();
    updateMaintenanceOverlay();
    renderAdminInputTab();
    renderAdminManageTab();
  } else {
    document.getElementById('mode-modal-msg').innerHTML = '<div class="alert alert-error">パスワードが違います。</div>';
  }
}

function logoutAdmin() {
  isAdmin = false;
  document.getElementById('mode-badge').textContent = '閲覧者モード';
  document.getElementById('mode-badge').className = 'badge';
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  closeModeModal();
  updateMaintenanceOverlay();
  showTab('input');
}

window.closeModeModal = closeModeModal;

function loginUser() {

  const password = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  if (!username) { msg.innerHTML = '<div class="alert alert-error">ユーザー名を入力してください。</div>'; return; }

function logoutUser() {

function pad(n) { return String(n).padStart(2, '0'); }
function toDateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
const todayStr = toDateStr(new Date());

function getDayType(username, dateStr) {
  return db.schedules[username]?.days?.[dateStr] || '';
}
function isAvailableType(type) {
  return type === 'full' || type === 'am' || type === 'pm';
}
function hasAnsweredInMonth(username, year, month) {
  const sched = db.schedules[username];
  if (!sched || !sched.days) return false;
  const prefix = `${year}-${pad(month+1)}-`;
  return Object.entries(sched.days).some(([date, type]) => date.startsWith(prefix) && isAvailableType(type));
}
function getAvailableUsersOnDate(users, dateStr) {
  return users.filter(u => isAvailableType(getDayType(u, dateStr)));
}
function getAnsweredUsersInMonth(users, year, month) {
  return users.filter(u => hasAnsweredInMonth(u, year, month));
}
function getCommonAvailabilityType(users, dateStr) {
  if (!users.length) return '';
  const types = users.map(u => getDayType(u, dateStr));
  if (types.some(t => !isAvailableType(t))) return '';
  if (types.every(t => t === 'full')) return 'full';
  if (types.every(t => t === 'am' || t === 'full')) return 'am';
  if (types.every(t => t === 'pm' || t === 'full')) return 'pm';
  return '';
}
function setInputType(type) { currentInputType = type; }

function renderInputCalendar() {
  const cal = document.getElementById('input-calendar');
  const title = document.getElementById('input-cal-title');
  if (!cal) return;
  title.textContent = `${inputYear}年 ${inputMonth + 1}月`;

  const DOW = ['日','月','火','水','木','金','土'];
  let html = DOW.map((d, i) => `<div class="cal-header${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');

  const firstDay = new Date(inputYear, inputMonth, 1).getDay();
  const daysInMonth = new Date(inputYear, inputMonth + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${inputYear}-${pad(inputMonth+1)}-${pad(d)}`;
    const dow = new Date(inputYear, inputMonth, d).getDay();
    const dayType = currentUser ? getDayType(currentUser, ds) : '';

    let cls = 'cal-day';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (ds === todayStr) cls += ' today';
    if (dayType === 'full') cls += ' day-free';
    else if (dayType === 'am') cls += ' day-am';
    else if (dayType === 'pm') cls += ' day-pm';

    html += `<div class="${cls}" onclick="toggleInputDay('${ds}')" title="${ds}"><span class="day-num">${d}</span></div>`;
  }
  cal.innerHTML = html;
}

function toggleInputDay(ds) {
  if (!currentUser) return;
  if (!db.schedules[currentUser]) db.schedules[currentUser] = { days: {}, times: {} };
  if (!db.schedules[currentUser].days) db.schedules[currentUser].days = {};
  if (!db.schedules[currentUser].times) db.schedules[currentUser].times = {};

  const currentType = getDayType(currentUser, ds);
  if (currentType === currentInputType) {
    delete inputSelections[ds];
    delete db.schedules[currentUser].days[ds];
  } else {
    inputSelections[ds] = currentInputType;
    db.schedules[currentUser].days[ds] = currentInputType;
  }
  renderInputCalendar();
}

function changeInputMonth(delta) {
  inputMonth += delta;
  if (inputMonth < 0) { inputMonth = 11; inputYear--; }
  if (inputMonth > 11) { inputMonth = 0; inputYear++; }
  renderInputCalendar();
}

function clearInputSelection() {
  if (!confirm('このユーザーの入力内容をクリアしますか？')) return;
  inputSelections = {};
  if (!db.schedules[currentUser]) db.schedules[currentUser] = { days: {}, times: {} };
  db.schedules[currentUser].days = {};
  db.schedules[currentUser].times = {};
  saveData();
  renderInputCalendar();
}

function saveSchedule() {
  if (!currentUser) return;
  if (!db.schedules[currentUser]) db.schedules[currentUser] = { days: {}, times: {} };
  if (!db.schedules[currentUser].days) db.schedules[currentUser].days = {};
  if (!db.schedules[currentUser].times) db.schedules[currentUser].times = {};

  Object.keys(db.schedules[currentUser].days).forEach(date => {
    if (!inputSelections[date]) {
      delete db.schedules[currentUser].days[date];
      delete db.schedules[currentUser].times[date];
    }
  });
  Object.entries(inputSelections).forEach(([date, type]) => {
    db.schedules[currentUser].days[date] = type;
    if (type !== 'time') delete db.schedules[currentUser].times[date];
  });

  saveData();
  showAlert('保存しました！', 'success');
}

function showAlert(msg, type) {
  const el = document.createElement('div');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  const area = document.getElementById('input-area') || document.body;
  area.insertBefore(el, area.firstChild);
  setTimeout(() => el.remove(), 3000);
}

window.renderInputCalendar = renderInputCalendar;
window.toggleInputDay = toggleInputDay;
window.changeInputMonth = changeInputMonth;
window.clearInputSelection = clearInputSelection;
window.saveSchedule = saveSchedule;
window.setInputType = setInputType;

function getCurrentUserGroups() {
  if (!currentUser) return [];
  return Object.entries(db.groups).filter(([, g]) => (g.members || []).includes(currentUser));
}

function togglePublicGroup(id, checked) {
  if (checked) {
    publicGroupIds = [id];
    document.querySelectorAll('#public-group-selector input[type=checkbox]').forEach(cb => {
      cb.checked = cb.getAttribute('onchange')?.includes(`'${id}'`) || false;
    });
  } else {
    publicGroupIds = [];
  }
  renderPublicGroupOptions();
  renderPublicCalendar();
}

function renderPublicGroupOptions() {
  const el = document.getElementById('public-group-selector');
  if (!el) return;
  if (!currentUser) {
    el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">公開カレンダーを見るにはログインしてください。</p>';
    document.getElementById('public-calendar-area').style.display = 'none';
    return;
  }
  const groups = getCurrentUserGroups();
  if (!groups.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">所属グループがありません。</p>';
    document.getElementById('public-calendar-area').style.display = 'none';
    return;
  }
  publicGroupIds = publicGroupIds.filter(id => groups.some(([gid]) => gid === id));
  el.innerHTML = groups.map(([id, g]) => {
    const memberRows = (g.members || []).map(name => {
      const unanswered = hasAnsweredInMonth(name, publicYear, publicMonth) ? '' : ' <span style="color:#dc2626;font-weight:700;">未回答</span>';
      return `<div style="font-size:0.82rem;color:#374151;padding-left:38px;">- ${name}${unanswered}</div>`;
    }).join('');
    return `<div style="border:1px solid var(--border);border-radius:8px;padding:10px;background:var(--bg);margin-bottom:8px;">
      <label class="user-item" style="cursor:pointer;background:white;margin-bottom:${(g.members||[]).length ? '8px' : '0'};">
        <input type="checkbox" ${publicGroupIds.includes(id)?'checked':''} onchange="togglePublicGroup('${id}',this.checked)">
        <div class="user-avatar">${(g.name[0]||'G').toUpperCase()}</div>
        <span class="user-name">${g.name}</span>
      </label>
      ${memberRows}
    </div>`;
  }).join('');
  renderPublicCalendar();
}

function renderPublicCalendar() {
  const area = document.getElementById('public-calendar-area');
  if (!currentUser || !publicGroupIds.length) { area.style.display = 'none'; return; }

  const groups = publicGroupIds.map(id => db.groups[id]).filter(Boolean);
  const members = [...new Set(groups.flatMap(g => g.members || []))];
  document.getElementById('public-group-title').textContent = `📁 ${groups.map(g => g.name).join(' / ')}`;
  area.style.display = 'block';
  document.getElementById('public-cal-title').textContent = `${publicYear}年 ${publicMonth + 1}月`;

  const dim = new Date(publicYear, publicMonth + 1, 0).getDate();
  const firstDay = new Date(publicYear, publicMonth, 1).getDay();
  const answeredUsers = getAnsweredUsersInMonth(members, publicYear, publicMonth);

  const DOW = ['日','月','火','水','木','金','土'];
  let html = DOW.map((d, i) => `<div class="cal-header${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

  let listHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
  let found = false;

  for (let d = 1; d <= dim; d++) {
    const ds = `${publicYear}-${pad(publicMonth+1)}-${pad(d)}`;
    const dow = new Date(publicYear, publicMonth, d).getDay();
    const availableUsers = getAvailableUsersOnDate(answeredUsers, ds);
    const freeCount = availableUsers.length;
    const commonType = getCommonAvailabilityType(answeredUsers, ds);
    const noneFree = answeredUsers.length > 0 ? freeCount === 0 : true;

    let cls = 'cal-day';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (ds === todayStr) cls += ' today';

    let colorClass = '';
    if (commonType === 'full') colorClass = 'common-all';
    else if (commonType === 'am') colorClass = 'day-am';
    else if (commonType === 'pm') colorClass = 'day-pm';
    else if (noneFree) colorClass = 'common-none';
    else colorClass = 'common-partial';
    cls += ' ' + colorClass;

    html += `<div class="${cls}" title="${ds}"><span class="day-num">${d}</span></div>`;

    if (commonType) {
      found = true;
      const dowStr = ['日','月','火','水','木','金','土'][dow];
      const label = commonType === 'full' ? '一日' : (commonType === 'am' ? '午前' : '午後');
      listHtml += `<div class="output-day">📅 ${ds}（${dowStr}） ${label}</div>`;
    }
  }
  listHtml += '</div>';
  if (!found) listHtml = '<p style="color:var(--muted);">この月に共通の空き日はありません。</p>';

  document.getElementById('public-calendar').innerHTML = html;
  document.getElementById('public-output-list').innerHTML = listHtml;
}

function changePublicMonth(delta) {
  publicMonth += delta;
  if (publicMonth < 0) { publicMonth = 11; publicYear--; }
  if (publicMonth > 11) { publicMonth = 0; publicYear++; }
  renderPublicCalendar();
}
window.togglePublicGroup = togglePublicGroup;
window.renderPublicGroupOptions = renderPublicGroupOptions;
window.renderPublicCalendar = renderPublicCalendar;
window.changePublicMonth = changePublicMonth;

function renderAdminInputTab() { }

function renderAdminManageTab() {
  renderAdminUserList();
  renderAdminGroupList();
}

function addUser() {
  const nameInput = document.getElementById('admin-new-username');
  const passInput = document.getElementById('admin-new-password');
  const name = nameInput.value.trim();
  const pass = passInput.value;
  if (!name) { alert('ユーザー名を入力してください。'); return; }
  if (!pass) { alert('パスワードを入力してください。'); return; }
  if (db.users[name]) { alert('すでに存在するユーザー名です。'); return; }
  nameInput.value = ''; passInput.value = '';
  db.users[name] = { password: pass };
  if (!db.schedules[name]) db.schedules[name] = { days: {}, times: {} };
  saveData();
  renderAdminManageTab();
}

function deleteUser(name) {
  if (!confirm(`"${name}" を削除しますか？`)) return;
  delete db.users[name];
  delete db.schedules[name];
  Object.values(db.groups).forEach(g => { g.members = (g.members||[]).filter(m => m !== name); });
  saveData();
  renderAdminManageTab();
}

function changeUserName(username) {
  const newName = prompt(`"${username}" の新しい名前を入力してください。`);
  if (!newName) return;
  const trimmed = newName.trim();
  if (!trimmed) { alert('名前を入力してください。'); return; }
  if (trimmed === username) return;
  if (db.users[trimmed]) { alert('その名前はすでに使われています。'); return; }

  db.users[trimmed] = db.users[username];
  delete db.users[username];

  if (db.schedules[username]) {
    db.schedules[trimmed] = db.schedules[username];
    delete db.schedules[username];
  }

  Object.values(db.groups).forEach(g => {
    if (!Array.isArray(g.members)) return;
    g.members = g.members.map(m => m === username ? trimmed : m);
  });

  if (currentUser === username) {
    currentUser = trimmed;
    const el = document.getElementById('current-username');
    if (el) el.textContent = trimmed;
  }

  saveData();
  renderAdminManageTab();
  alert('名前を変更しました。');
}

function changeUserPassword(username) {
  const newPass = prompt(`"${username}" の新しいパスワードを入力してください。`);
  if (!newPass) return;
  db.users[username].password = newPass;
  saveData();
  renderAdminUserList();
  alert('パスワードを変更しました。');
}

function togglePasswordVisibility(username) {
  const el = document.getElementById(`pw-text-${username}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'inline-block' : 'none';
}

function renderAdminUserList() {
  const el = document.getElementById('admin-user-list');
  const users = Object.keys(db.users).sort((a,b) => a.localeCompare(b,'ja'));
  if (!users.length) { el.innerHTML = '<p style="color:var(--muted);">ユーザーがいません。</p>'; return; }
  const colors = ['#2563eb','#7c3aed','#16a34a','#dc2626','#d97706','#0891b2','#be185d','#65a30d'];
  el.innerHTML = users.map((u, i) => `
    <div class="user-item" style="flex-wrap:wrap;align-items:center;">
      <div class="user-avatar" style="background:${colors[i%colors.length]}">${u[0].toUpperCase()}</div>
      <span class="user-name">${u}</span>
      <span class="pw-text" id="pw-text-${u}" style="display:none;">${db.users[u].password || ''}</span>
      <button class="btn btn-secondary btn-sm" onclick="togglePasswordVisibility('${u}')">👁</button>
      <button class="btn btn-secondary btn-sm" onclick="changeUserName('${u}')">名前変更</button>
      <button class="btn btn-secondary btn-sm" onclick="changeUserPassword('${u}')">PW変更</button>
      <button class="btn btn-danger btn-sm" onclick="deleteUser('${u}')">削除</button>
    </div>`).join('');
}

function addGroup() {
  const nameInput = document.getElementById('admin-group-name');
  const name = nameInput.value.trim();
  if (!name) { alert('グループ名を入力してください。'); return; }
  if (Object.values(db.groups).some(g => g.name === name)) { alert('同じグループ名がすでにあります。'); nameInput.value=''; return; }
  nameInput.value = '';
  const id = 'g_' + Date.now();
  db.groups[id] = { name, members: [] };
  saveData();
  renderAdminManageTab();
}

function deleteGroup(id) {
  if (!db.groups[id]) return;
  if (!confirm(`グループ "${db.groups[id].name}" を削除しますか？`)) return;
  delete db.groups[id];
  saveData();
  renderAdminManageTab();
}

function toggleGroupMember(groupId, username) {
  const group = db.groups[groupId];
  if (!group) return;
  if (!Array.isArray(group.members)) group.members = [];
  if (group.members.includes(username)) {
    group.members = group.members.filter(m => m !== username);
  } else {
    group.members.push(username);
  }
  saveData();
  renderAdminManageTab();
}

function renderAdminGroupList() {
  const el = document.getElementById('admin-group-list');
  const groups = Object.entries(db.groups).sort((a,b) => a[1].name.localeCompare(b[1].name,'ja'));
  if (!groups.length) { el.innerHTML = '<p style="color:var(--muted);">グループがありません。</p>'; return; }
  const users = Object.keys(db.users).sort((a,b) => a.localeCompare(b,'ja'));
  el.innerHTML = groups.map(([id, g]) => `
    <div class="group-item" style="flex-direction:column;align-items:flex-start;gap:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
        <strong>${g.name}</strong>
        <button class="btn btn-danger btn-sm" onclick="deleteGroup('${id}')">削除</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${users.map(u => `
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:0.85rem;
            padding:4px 8px;border-radius:6px;
            border:1.5px solid ${(g.members||[]).includes(u)?'#2563eb':'var(--border)'};
            background:${(g.members||[]).includes(u)?'#dbeafe':'white'};">
            <input type="checkbox" ${(g.members||[]).includes(u)?'checked':''} onchange="toggleGroupMember('${id}','${u}')">
            ${u}
          </label>`).join('')}
        ${!users.length ? '<span style="color:var(--muted);">ユーザーがいません</span>' : ''}
      </div>
      <div style="font-size:0.8rem;color:var(--muted);">メンバー: ${(g.members||[]).length>0 ? (g.members||[]).join(', ') : 'なし'}</div>
    </div>`).join('');
}

function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `schedule-data-${toDateStr(new Date())}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.users && imported.groups && imported.schedules) {
        db = imported;
        saveData();
        renderAdminManageTab();
        alert('データを読み込みました。');
      } else { alert('無効なデータ形式です。'); }
    } catch { alert('ファイルの読み込みに失敗しました。'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAll() {
  db = getDefaultData();
  saveData();
  logoutUser();
  renderAdminManageTab();
  alert('全データをリセットしました。');
}

window.addUser = addUser;

window.changeUserPassword = changeUserPassword;
window.togglePasswordVisibility = togglePasswordVisibility;
window.addGroup = addGroup;
window.deleteGroup = deleteGroup;
window.toggleGroupMember = toggleGroupMember;
window.exportData = exportData;
window.importData = importData;
window.resetAll = resetAll;

  await ensureAdminHash();

});
